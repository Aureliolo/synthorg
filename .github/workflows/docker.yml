name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Extract app version from pyproject.toml (single source of truth)
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['commitizen']['version'])")
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

  build-backend:
    name: Build Backend
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aureliolo/ai-company-backend
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/aureliolo/ai-company-backend:${{ needs.version.outputs.app_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Grype scan
        uses: anchore/scan-action@v6
        with:
          image: ghcr.io/aureliolo/ai-company-backend:${{ needs.version.outputs.app_version }}
          fail-build: true
          severity-cutoff: high

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest || '' }}
        run: |
          if [ -n "$DIGEST" ]; then
            cosign sign --yes ghcr.io/aureliolo/ai-company-backend@${DIGEST}
          else
            echo "No digest available, skipping signing"
          fi

  build-web:
    name: Build Web
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aureliolo/ai-company-web
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/aureliolo/ai-company-web:${{ needs.version.outputs.app_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Grype scan
        uses: anchore/scan-action@v6
        with:
          image: ghcr.io/aureliolo/ai-company-web:${{ needs.version.outputs.app_version }}
          fail-build: true
          severity-cutoff: high

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest || '' }}
        run: |
          if [ -n "$DIGEST" ]; then
            cosign sign --yes ghcr.io/aureliolo/ai-company-web@${DIGEST}
          else
            echo "No digest available, skipping signing"
          fi
