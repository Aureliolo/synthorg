{% extends "main.html" %}

{% block content %}
<style>
  /* Strip MkDocs Material layout constraints — give Scalar the full page */
  .md-main__inner,
  .md-content,
  .md-content__inner {
    max-width: none;
    margin: 0;
    padding: 0;
  }
  /* Hide MkDocs sidebar, TOC, and footer on this page */
  .md-sidebar,
  .md-footer {
    display: none;
  }
  /* Fill viewport below the MkDocs header */
  .md-content__inner {
    min-height: calc(100vh - 3.6rem);
  }
</style>

<script
  id="api-reference"
  data-url="../_generated/openapi.json"
  data-configuration='{"theme": "default", "layout": "modern"}'
></script>
<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.48.5"></script>
{% endblock %}
