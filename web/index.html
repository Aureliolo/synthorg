<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Company</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-checking { background: #1e293b; color: #94a3b8; }
    .status-checking .status-dot { background: #94a3b8; }
    .status-connected { background: #064e3b; color: #6ee7b7; }
    .status-connected .status-dot { background: #34d399; }
    .status-disconnected { background: #450a0a; color: #fca5a5; }
    .status-disconnected .status-dot { background: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Company</h1>
    <p class="subtitle">Dashboard &mdash; Coming Soon</p>
    <div id="status" class="status status-checking">
      <span class="status-dot"></span>
      <span id="status-text">Checking backend...</span>
    </div>
  </div>
  <script>
    (function () {
      var el = document.getElementById("status");
      var text = document.getElementById("status-text");

      function check() {
        fetch("/api/v1/health")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var s = data.data && data.data.status;
            el.className = "status status-connected";
            text.textContent = "Backend connected (v" + (data.data && data.data.version || "?") + " \u2014 " + (s || "ok") + ")";
          })
          .catch(function () {
            el.className = "status status-disconnected";
            text.textContent = "Backend unreachable";
          });
      }

      check();
      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
