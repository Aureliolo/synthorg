version: "2"

run:
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - bodyclose
    - errname
    - errorlint
    - noctx
    - prealloc
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
